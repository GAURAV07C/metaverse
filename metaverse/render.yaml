services:
  - type: web
    name: http
    env: node
    plan: free
    buildCommand: cd metaverse && yarn install --production=false && cd apps/http && yarn build
    startCommand: cd metaverse/apps/http && yarn start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "http://localhost:5173,http://localhost:3000"

  - type: web
    name: ws
    env: node
    plan: free
    buildCommand: cd metaverse && yarn install --production=false && cd apps/ws && yarn build
    startCommand: cd metaverse/apps/ws && yarn start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: ${DATABASE_URL}

  - type: web
    name: web
    env: node
    plan: free
    buildCommand: cd metaverse && yarn install --production=false && cd apps/web && yarn build
    startCommand: cd metaverse/apps/web && npx serve dist -l $PORT -s
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_APP_API_URL
        value: ${VITE_APP_API_URL}
      - key: VITE_APP_WS_URL
        value: ${VITE_APP_WS_URL}
